name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'simp-api'
  AZURE_WEBAPP_PACKAGE_PATH: './publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore SmartIncidentPlatform.sln
    
    - name: Build
      run: dotnet build SmartIncidentPlatform.sln --no-restore --configuration Release
    
    - name: Test
      run: dotnet test SmartIncidentPlatform.sln --no-build --configuration Release --verbosity normal
    
    - name: Publish
      run: dotnet publish src/API/SIMP.API.csproj --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    
    - name: Run database migrations
      run: |
        dotnet tool install --global dotnet-ef
        dotnet ef database update --project src/Infrastructure/SIMP.Infrastructure.csproj --startup-project src/API/SIMP.API.csproj
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.DATABASE_CONNECTION_STRING }}

  notify:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.build-and-deploy.result == 'success'
      run: echo "Deployment successful!"
    
    - name: Notify on failure
      if: needs.build-and-deploy.result == 'failure'
      run: echo "Deployment failed!"
